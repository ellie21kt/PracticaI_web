<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolución Web Responsiva</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="contenedor-principal">
        <header>
            <h1>Evolución <span>Digital</span></h1>
        </header>

        <section class="card">
            <h2 id="titulo-etapa">Bienvenido</h2>
            <div class="descripcion-container">
                <p id="descripcion">Haz clic en los botones para descubrir cómo las aplicaciones web han evolucionado desde simples documentos hasta ecosistemas inteligentes.</p>
            </div>
            
            <nav class="menu-botones">
                <button class="btn-era" onclick="mostrarInfo('web1')">Web 1.0</button>
                <button class="btn-era" onclick="mostrarInfo('web2')">Web 2.0</button>
                <button class="btn-era" onclick="mostrarInfo('web3')">Web 3.0</button>
            </nav>

            <button class="btn-descubrir" onclick="mostrarMensaje()">Descubre más</button>
        </section>
    </main>

    <div id="miModal" class="modal">
        <div class="modal-contenido">
            <h3>Notificación del Sistema</h3>
            <p>Has activado la vista de información extendida. El diseño que ves es 100% adaptable.</p>
            <button class="btn-aceptar" onclick="cerrarModal()">Entendido</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
