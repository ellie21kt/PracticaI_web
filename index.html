<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolución Web | Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="contenedor-principal">
        <header class="header-centrado">
            <h1 class="titulo-principal">
                <span class="linea-1">Evolución Digital</span>
                <span class="linea-2">de las</span>
                <span class="linea-3">Aplicaciones Web</span>
            </h1>
        </header>

        <section class="card">
            <div class="contenido-texto">
                <h2 id="titulo-etapa">Bienvenido</h2>
                <p id="descripcion">Haz clic en los botones para explorar la historia de la web.</p>
            </div>
            
            <div class="menu-botones">
                <button class="btn-era" onclick="mostrarInfo('web1')">Web 1.0</button>
                <button class="btn-era" onclick="mostrarInfo('web2')">Web 2.0</button>
                <button class="btn-era" onclick="mostrarInfo('web3')">Web 3.0</button>
            </div>

            <button class="btn-descubrir" onclick="mostrarMensaje()">Descubre más</button>
        </section>
    </main>

    <div id="miModal" class="modal">
        <div class="modal-contenido">
            <h3>Notificación</h3>
            <p>Las aplicaciones web han evolucionado significativamente.</p>
            <button class="btn-aceptar" onclick="cerrarModal()">Aceptar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
